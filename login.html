<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorized Login | Secure Access</title>
    <style>
        :root {
            --light-blue: #e3f2fd;
            --deep-blue: #1976d2;
            --relax-yellow: #fffde7; /* Soft cream-yellow */
            --action-orange: #ff9800;
            --dark-orange: #f57c00;
            --text-dark: #333;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--light-blue);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background-color: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 380px;
            text-align: center;
            border-top: 6px solid var(--action-orange);
        }

        h2 {
            color: var(--text-dark);
            margin-bottom: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #eaeaea;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.3s ease;
            background-color: #fcfcfc;
        }

        input:focus {
            outline: none;
            border-color: var(--action-orange);
            background-color: var(--relax-yellow);
            box-shadow: 0 0 0 4px rgba(255, 152, 0, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn-primary {
            background-color: var(--action-orange);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 152, 0, 0.2);
        }

        .btn-primary:hover {
            background-color: var(--dark-orange);
            transform: translateY(-1px);
        }

        .btn-google {
            background-color: white;
            border: 1px solid #ddd;
            color: #444;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-google:hover {
            background-color: #f8f8f8;
        }

        .btn:active {
            transform: translateY(0);
        }

        .divider {
            margin: 30px 0;
            position: relative;
            text-align: center;
        }

        .divider::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #eee;
            z-index: 1;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            position: relative;
            z-index: 2;
            color: #888;
            font-size: 13px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Secure Login</h2>

    <div class="input-group">
        <input type="email" id="email" placeholder="Email Address">
    </div>
    <div class="input-group">
        <input type="password" id="password" placeholder="Password">
    </div>

    <button class="btn btn-primary" onclick="emailLogin()">Sign In</button>
    
    <div class="divider"><span>OR</span></div>

    <button class="btn btn-google" onclick="googleLogin()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="G">
        Continue with Google
    </button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, 
  signInWithEmailAndPassword, 
  GoogleAuthProvider, 
  signInWithPopup,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { 
  getFirestore, 
  doc, 
  getDoc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBhSGWq8LiC3WR2olbokI_l0XkoVR6H_KY",
  authDomain: "account-billing-7472a.firebaseapp.com",
  projectId: "account-billing-7472a",
  storageBucket: "account-billing-7472a.firebasestorage.app",
  messagingSenderId: "640274779253",
  appId: "1:640274779253:web:e04e38d2fd9dede2883c3c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ================= EMAIL LOGIN =================
window.emailLogin = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(!email || !password) {
      alert("Fields cannot be empty.");
      return;
  }

  signInWithEmailAndPassword(auth, email, password)
    .then((res) => checkRole(res.user))
    .catch((err) => alert("Authentication failed: " + err.message));
};

// ================= GOOGLE LOGIN =================
window.googleLogin = async function() {
  const provider = new GoogleAuthProvider();
  try {
    const result = await signInWithPopup(auth, provider);
    checkRole(result.user);
  } catch (err) {
    alert(err.message);
  }
};

// ================= ROLE CHECK =================
async function checkRole(user) {
  const ref = doc(db, "users", user.uid);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    const role = snap.data().role;
    window.location.href = (role === "admin") ? "admin.html" : "dashboard.html";
  } else {
    // Logging out unauthorized users who aren't in the database
    alert("Access Denied: You do not have an authorized account.");
    auth.signOut();
  }
}

// ================= AUTO LOGIN =================
onAuthStateChanged(auth, (user) => {
  if (user) {
    checkRole(user);
  }
});
</script>

</body>
</html>
